<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brigada Liniste - Calculator Taxe</title>
<style>
  :root {
    --bg: #05070c;
    --panel: rgba(9, 13, 22, 0.72);
    --panel-strong: rgba(9, 13, 22, 0.88);
    --line: rgba(255, 255, 255, 0.14);
    --line-hot: rgba(119, 223, 255, 0.58);
    --text: #f7fbff;
    --muted: #aeb9c8;
    --blue: #79ddff;
    --pink: #ff5fb7;
    --green: #67f58d;
    --gold: #ffd166;
  }

  * {
    box-sizing: border-box;
  }

  html {
    min-height: 100%;
    background: var(--bg);
  }

  body {
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background:
      linear-gradient(180deg, rgba(5, 7, 12, 0.12), rgba(5, 7, 12, 0.32) 44%, rgba(5, 7, 12, 0.68)),
      url("background.png") center / cover fixed no-repeat;
  }

  body::before {
    display: none;
  }

  body::after {
    display: none;
  }

  .page {
    width: min(1180px, calc(100% - 36px));
    min-height: 100vh;
    margin: 0 auto;
    padding: 12px 0 14px;
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 10px;
  }

  .wash-card {
    width: min(620px, 100%);
    margin: 0 auto;
    padding: 12px;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 8px;
    background: linear-gradient(180deg, rgba(9, 13, 22, 0.62), rgba(9, 13, 22, 0.42));
    box-shadow: 0 18px 56px rgba(0, 0, 0, 0.36), 0 0 32px rgba(121, 221, 255, 0.1);
    backdrop-filter: blur(16px);
  }

  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 0 0 10px;
    font-size: clamp(18px, 1.8vw, 24px);
    line-height: 1;
  }

  .badge {
    padding: 6px 9px;
    border-radius: 7px;
    border: 1px solid rgba(255, 255, 255, 0.16);
    color: var(--gold);
    background: rgba(255, 255, 255, 0.07);
    font-size: 12px;
    font-weight: 800;
  }

  .fields {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  label {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 112px;
    align-items: center;
    gap: 10px;
    min-height: 36px;
    padding: 6px 10px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.075);
    color: var(--muted);
    font-size: 13px;
    font-weight: 800;
  }

  label span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  input {
    width: 112px;
    height: 28px;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 7px;
    outline: none;
    background: rgba(247, 251, 255, 0.95);
    color: #08111d;
    text-align: center;
    font-weight: 900;
  }

  input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(121, 221, 255, 0.22);
  }

  .result {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-top: 10px;
  }

  .result-item {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.065);
    color: var(--gold);
    font-weight: 900;
  }

  .result-item span {
    color: #fff;
  }

  .zones {
    min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 10px;
  }

  .zone-nav {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .zone-button {
    position: relative;
    min-height: clamp(92px, 14vh, 124px);
    padding: 12px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.16);
    border-radius: 8px;
    color: #fff;
    text-align: left;
    background:
      linear-gradient(180deg, rgba(8, 13, 22, 0.12), rgba(8, 13, 22, 0.82)),
      var(--zone-image);
    background-size: cover;
    cursor: pointer;
    box-shadow: 0 16px 36px rgba(0, 0, 0, 0.32);
    transition: transform 260ms ease, border-color 260ms ease, box-shadow 260ms ease, opacity 260ms ease;
  }

  .zone-button:hover,
  .zone-button.active {
    transform: translateY(-4px);
    border-color: var(--line-hot);
    box-shadow: 0 22px 54px rgba(0, 0, 0, 0.42), 0 0 34px rgba(121, 221, 255, 0.16);
  }

  .zone-button[data-zone="burro"] {
    --zone-image: url("el-burro.png");
    background-position: center;
  }

  .zone-button[data-zone="groove"] {
    --zone-image: url("groove.png");
    background-position: center;
  }

  .zone-button[data-zone="vespucci"] {
    --zone-image: url("vespucci.png");
    background-position: center;
  }

  .zone-button::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(121, 221, 255, 0.18), transparent 42%, rgba(255, 95, 183, 0.14));
    opacity: 0;
    transition: opacity 260ms ease;
  }

  .zone-button:hover::after,
  .zone-button.active::after {
    opacity: 1;
  }

  .zone-name {
    position: relative;
    z-index: 1;
    display: block;
    font-size: clamp(24px, 2.8vw, 36px);
    font-weight: 900;
    text-transform: uppercase;
    text-shadow: 0 0 16px rgba(0, 0, 0, 0.78);
  }

  .zone-meta {
    position: absolute;
    left: 12px;
    bottom: 10px;
    z-index: 1;
    color: rgba(255, 255, 255, 0.72);
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .active-stage {
    position: relative;
    min-height: 0;
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 8px;
    background: rgba(9, 13, 22, 0.5);
    box-shadow: 0 20px 70px rgba(0, 0, 0, 0.34);
    backdrop-filter: blur(16px);
    overflow: hidden;
  }

  .zone-panel {
    display: none;
    min-height: 100%;
    grid-template-columns: minmax(280px, 0.95fr) minmax(340px, 1.05fr);
    gap: 16px;
    padding: 14px;
    animation: panelIn 340ms ease both;
  }

  .zone-panel.active {
    display: grid;
  }

  .panel-image {
    min-height: 218px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.13);
    background:
      linear-gradient(180deg, rgba(5, 7, 12, 0.04), rgba(5, 7, 12, 0.76)),
      var(--panel-image);
    background-size: cover;
    box-shadow: inset 0 -70px 90px rgba(0, 0, 0, 0.52);
  }

  .zone-panel[data-zone="burro"] {
    --panel-image: url("el-burro.png");
  }

  .zone-panel[data-zone="groove"] {
    --panel-image: url("groove.png");
  }

  .zone-panel[data-zone="vespucci"] {
    --panel-image: url("vespucci.png");
  }

  .zone-panel .panel-image {
    background-position: center;
  }

  .calculator {
    align-self: center;
  }

  .calculator .fields {
    grid-template-columns: 1fr;
  }

  .calculator .result {
    grid-template-columns: 1fr 1fr;
    margin-top: 8px;
  }

  .empty-hint {
    padding: 18px;
    color: var(--muted);
    font-weight: 800;
    text-align: center;
  }

  @keyframes titleGlow {
    0%, 100% {
      text-shadow: 0 0 8px rgba(121, 221, 255, 0.82), 0 0 28px rgba(121, 221, 255, 0.4), 0 0 52px rgba(255, 95, 183, 0.2);
    }
    50% {
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.92), 0 0 36px rgba(121, 221, 255, 0.58), 0 0 66px rgba(255, 95, 183, 0.3);
    }
  }

  @keyframes panelIn {
    from {
      opacity: 0;
      transform: translateY(16px) scale(0.985);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @media (max-width: 980px) {
    body {
      overflow-y: auto;
    }

    .page {
      width: min(760px, calc(100% - 28px));
    }

    .zone-nav,
    .fields,
    .result {
      grid-template-columns: 1fr;
    }

    .zone-panel {
      grid-template-columns: 1fr;
    }

  }

  @media (max-width: 560px) {
    .page {
      width: min(100% - 20px, 520px);
      padding-top: 16px;
    }

    label {
      grid-template-columns: 1fr;
    }

    input {
      width: 100%;
    }

    .panel-image {
      min-height: 180px;
    }
  }
</style>
</head>
<body>
  <main class="page">
    <section class="wash-card" aria-label="Spalare bani">
      <h2 class="section-title">Spalare Bani <span class="badge">Taxa variabila</span></h2>
      <div class="fields">
        <label><span>Bani murdari</span><input type="number" id="baniMurdari" value="0" min="0"></label>
        <label><span>Taxa (%)</span><input type="number" id="taxaSpalare" value="10" min="0" max="100"></label>
      </div>
      <div class="result">
        <div class="result-item">Taxa <span id="taxaCalculata">0</span></div>
        <div class="result-item">Bani curati <span id="baniCurati">0</span></div>
      </div>
    </section>

    <section class="zones" aria-label="Zone taxe">
      <nav class="zone-nav" aria-label="Alege zona">
        <button class="zone-button active" type="button" data-zone="burro" aria-pressed="true">
          <span class="zone-name">El Burro</span>
          <span class="zone-meta">materiale speciale</span>
        </button>
        <button class="zone-button" type="button" data-zone="groove" aria-pressed="false">
          <span class="zone-name">Groove</span>
          <span class="zone-meta">produse stradale</span>
        </button>
        <button class="zone-button" type="button" data-zone="vespucci" aria-pressed="false">
          <span class="zone-name">Vespucci</span>
          <span class="zone-meta">zona verde</span>
        </button>
      </nav>

      <div class="active-stage">
        <article class="zone-panel active" data-zone="burro" aria-label="Calculator El Burro">
          <div class="panel-image" aria-hidden="true"></div>
          <div class="calculator">
            <h2 class="section-title">El Burro <span class="badge">10%</span></h2>
            <div class="fields">
              <label><span>Teava (13000)</span><input type="number" id="teava" value="0" min="0"></label>
              <label><span>Maner (13000)</span><input type="number" id="maner" value="0" min="0"></label>
              <label><span>Element (6500)</span><input type="number" id="element" value="0" min="0"></label>
              <label><span>Metafetamina (21000)</span><input type="number" id="metafetamina" value="0" min="0"></label>
            </div>
            <div class="result">
              <div class="result-item">Total <span id="total2">0</span></div>
              <div class="result-item">10% <span id="procent2">0</span></div>
            </div>
          </div>
        </article>

        <article class="zone-panel" data-zone="groove" aria-label="Calculator Groove">
          <div class="panel-image" aria-hidden="true"></div>
          <div class="calculator">
            <h2 class="section-title">Groove <span class="badge">10%</span></h2>
            <div class="fields">
              <label><span>LSD (3400)</span><input type="number" id="lsd" value="0" min="0"></label>
              <label><span>Tigari (5400)</span><input type="number" id="tigari" value="0" min="0"></label>
              <label><span>Cocaina (2900)</span><input type="number" id="cocaina" value="0" min="0"></label>
              <label><span>Trabucuri (1750)</span><input type="number" id="trabucuri" value="0" min="0"></label>
            </div>
            <div class="result">
              <div class="result-item">Total <span id="total1">0</span></div>
              <div class="result-item">10% <span id="procent1">0</span></div>
            </div>
          </div>
        </article>

        <article class="zone-panel" data-zone="vespucci" aria-label="Calculator Vespucci">
          <div class="panel-image" aria-hidden="true"></div>
          <div class="calculator">
            <h2 class="section-title">Vespucci <span class="badge">10%</span></h2>
            <div class="fields">
              <label><span>Alcool (12000)</span><input type="number" id="alcool" value="0" min="0"></label>
              <label><span>Marihuana (1900)</span><input type="number" id="marihuana" value="0" min="0"></label>
              <label><span>Stick (10000)</span><input type="number" id="stick" value="0" min="0"></label>
            </div>
            <div class="result">
              <div class="result-item">Total <span id="total3">0</span></div>
              <div class="result-item">10% <span id="procent3">0</span></div>
            </div>
          </div>
        </article>
      </div>
    </section>
  </main>

<script>
  const preturi = {
    lsd: 3400,
    tigari: 5400,
    cocaina: 2900,
    trabucuri: 1750,
    teava: 13000,
    maner: 13000,
    element: 6500,
    metafetamina: 21000,
    alcool: 12000,
    marihuana: 1900,
    stick: 10000
  };

  const zoneInputs = {
    groove: {
      inputs: ["lsd", "tigari", "cocaina", "trabucuri"],
      totalId: "total1",
      procentId: "procent1"
    },
    burro: {
      inputs: ["teava", "maner", "element", "metafetamina"],
      totalId: "total2",
      procentId: "procent2"
    },
    vespucci: {
      inputs: ["alcool", "marihuana", "stick"],
      totalId: "total3",
      procentId: "procent3"
    }
  };

  function formatNumber(value) {
    return value.toLocaleString("ro-RO");
  }

  function calculeazaSectiune(config) {
    const total = config.inputs.reduce((sum, id) => {
      const cantitate = parseInt(document.getElementById(id).value, 10) || 0;
      return sum + cantitate * preturi[id];
    }, 0);

    document.getElementById(config.totalId).innerText = formatNumber(total);
    document.getElementById(config.procentId).innerText = formatNumber(total * 0.10);
  }

  function calculeazaSpalare() {
    const bani = parseFloat(document.getElementById("baniMurdari").value) || 0;
    const procent = parseFloat(document.getElementById("taxaSpalare").value) || 0;
    const taxa = bani * (procent / 100);

    document.getElementById("taxaCalculata").innerText = formatNumber(taxa);
    document.getElementById("baniCurati").innerText = formatNumber(bani - taxa);
  }

  function activeazaZona(zone) {
    document.querySelectorAll(".zone-button").forEach(button => {
      const isActive = button.dataset.zone === zone;
      button.classList.toggle("active", isActive);
      button.setAttribute("aria-pressed", String(isActive));
    });

    document.querySelectorAll(".zone-panel").forEach(panel => {
      panel.classList.toggle("active", panel.dataset.zone === zone);
    });
  }

  Object.values(zoneInputs).forEach(config => {
    config.inputs.forEach(id => {
      document.getElementById(id).addEventListener("input", () => calculeazaSectiune(config));
    });
    calculeazaSectiune(config);
  });

  document.querySelectorAll(".zone-button").forEach(button => {
    button.addEventListener("click", () => activeazaZona(button.dataset.zone));
  });

  document.getElementById("baniMurdari").addEventListener("input", calculeazaSpalare);
  document.getElementById("taxaSpalare").addEventListener("input", calculeazaSpalare);
  calculeazaSpalare();
</script>
</body>
</html>
